{% load i18n %}

<div class="results-controls__limit">
    <span class="results-controls__label">{% trans "Exibir:" %}</span>
    <div class="results-controls__select-wrap">
        <select id="results-limit-select" class="results-controls__select" aria-label="{% trans 'Selecionar número de resultados por página' %}">
            <option value="10" {% if results_data.current_limit == 10 %}selected{% endif %}>10</option>
            <option value="25" {% if results_data.current_limit == 25 %}selected{% endif %}>25</option>
            <option value="50" {% if results_data.current_limit == 50 %}selected{% endif %}>50</option>
            <option value="100" {% if results_data.current_limit == 100 %}selected{% endif %}>100</option>
        </select>
    </div>
</div>
