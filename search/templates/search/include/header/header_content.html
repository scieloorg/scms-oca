{% load i18n_filters %}
{% load static %}
{% load i18n %}

<div class="search-header-card">
    <div class="search-header-card__top">
        <div class="search-header-card__heading">
            <h1 class="search-header-card__title">{% trans "Modo de busca" %}</h1>
            <div class="search-mode-toggle" role="group" aria-label="{% trans 'Modo de busca' %}">
                <button type="button" class="search-mode-btn search-mode-btn--active" data-mode="by_field">
                    <span class="search-mode-btn__icon list-icon"></span>
                    {% trans "Campos" %}
                </button>
                <button type="button" class="search-mode-btn" data-mode="advanced">
                    <span class="search-mode-btn__icon terminal-icon"></span>
                    {% trans "Avançada" %}
                </button>
            </div>
        </div>
        <button type="button" id="search-sidebar-toggle"
            class="search-header-card__toggle search-header-card__toggle--filters"
            data-label-show="{% trans 'Mostrar filtros' %}" data-label-hide="{% trans 'Ocultar filtros' %}"
            aria-expanded="true" aria-controls="search-sidebar-col">
            <span class="search-header-card__toggle-icon" aria-hidden="true"></span>
            <span class="search-header-card__toggle-text">{% trans "Ocultar filtros" %}</span>
        </button>
    </div>
    <form method="get" action="{{ request.path }}" id="search-form" class="search-header-card__search">
        <div id="search-mode-by-field-container" class="search-mode-container">
            {% include "search/include/search/by_field.html" %}
        </div>
        <div id="search-mode-advanced-container" class="search-mode-container" style="display: none;">
            {% include "search/include/search/advanced.html" %}
        </div>
    </form>
</div>

<div id="advanced-guide-wrapper" style="display: none;">
    {% include "search/include/search/advanced_guide.html" %}
</div>

<template id="advanced-search-row-template">
    <div class="advanced-search-row search-input-card__row" data-row-index="">
        <select class="form-select search-operator" aria-label="{% trans 'Operador lógico' %}">
            <option value="AND">{% trans "AND" %}</option>
            <option value="OR">{% trans "OR" %}</option>
            <option value="NOT">{% trans "NOT" %}</option>
        </select>
        <select class="form-select search-field-select" aria-label="{% trans 'Campo de busca' %}">
            {% for value, label in searchable_fields %}
            <option value="{{ value }}">{{ label }}</option>
            {% endfor %}
        </select>
        <input type="search" class="search-input-card__input search-text-input"
            placeholder="{% trans 'Termos de pesquisa...' %}" autocomplete="off">
        <button type="button" class="btn-remove-row" aria-label="{% trans 'Remover' %}">
            <i class="icon-trash"></i>
        </button>
    </div>
</template>
