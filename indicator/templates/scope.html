{% load i18n static %}

<div
  id="scope-controls"
  class="indicator-scope-panel"
  data-data-source="{{ data_source|default:'scientific_production'|escape }}"
  data-study-unit="{{ study_unit|default:'document'|escape }}"
  data-indicator-home-url="{% url 'indicator_home' %}"
  data-journal-metrics-url="{% url 'indicator_journal_metrics' %}"
>
  <div class="indicator-scope-panel__head">
    <div class="indicator-scope-panel__title">{% trans "Scope" %}</div>
  </div>

  <div class="indicator-scope-panel__body">
    <div class="indicator-scope-panel__section">
      <div class="indicator-scope-panel__section-title">{% trans "Aggregation Mode" %}</div>
      <form id="study-unit-form" class="mb-0">
        <label class="indicator-scope-panel__label" for="selectStudyUnit">{% trans "Study unit" %}</label>
        <div class="input-group">
          <select class="form-select indicator-scope-panel__select" id="selectStudyUnit" name="study_unit">
            <option selected value="document">{% trans "Document" %}</option>
            <option value="source">{% trans "Source" %}</option>
            <option value="journal_metrics_by_*">{% trans "Journal Metrics" %}</option>
          </select>
        </div>
      </form>
    </div>
  </div>
</div>
