{% load wagtailcore_tags %}

{% if not page.specific.use_only_embed and page.body %}
  <section id="content">
    <div class="content-wrap p-1">
      <div class="container clearfix">
        {{ page.body|richtext }}
      </div>
    </div>
  </section>
{% endif %}

{% if page.specific.embed %}
  <div class="{{ embed_container_classes|default:'container py-0' }}">
    {{ page.specific.embed|safe }}
  </div>
{% endif %}
