{% for node in items %}
    <li class="menu-item {% if not is_dropdown %}analytics-nav-item{% endif %}{% if node.children %} sub-menu{% endif %}{% if node.active %} active{% endif %}">
        {% if node.children %}
            <button class="menu-link {% if not is_dropdown %}analytics-nav-link{% endif %}{% if node.icon_svg %} analytics-nav-link-with-icon{% endif %} analytics-nav-toggle" type="button" aria-haspopup="true" aria-expanded="false">
                <span class="analytics-inline-icon" aria-hidden="true">
                    {{ node.icon_svg|safe }}
                </span>
                <div>{{ node.label }}</div>
            </button>
            <ul class="sub-menu-container analytics-dropdown{% if is_dropdown %} analytics-dropdown-nested{% endif %} menu-container">
                {% include 'sa_menu/desktop_items.html' with items=node.children is_dropdown=True %}
            </ul>
        {% else %}
            <a class="menu-link {% if not is_dropdown %}analytics-nav-link{% endif %}{% if node.icon_svg %} analytics-nav-link-with-icon{% endif %}" href="{{ node.url }}"{% if node.open_in_new_tab %} target="_blank" rel="noopener noreferrer"{% endif %}>
                <span class="analytics-inline-icon" aria-hidden="true">
                    {{ node.icon_svg|safe }}
                </span>
                <div>{{ node.label }}</div>
            </a>
        {% endif %}
    </li>
{% endfor %}
