{% for node in items %}
    <li class="menu-item{% if node.children %} sub-menu{% endif %}{% if node.active %} active{% endif %}">
        {% if node.children %}
            <button class="menu-link analytics-nav-toggle" type="button" aria-haspopup="true" aria-expanded="false">
                <span class="analytics-inline-icon" aria-hidden="true">
                    {{ node.icon_svg|safe }}
                </span>
                <div>{{ node.label }}</div>
            </button>
            <ul class="sub-menu-container analytics-dropdown{% if is_nested %} analytics-dropdown-nested{% endif %} menu-container">
                {% include 'sa_menu/mobile_items.html' with items=node.children is_nested=True %}
            </ul>
        {% else %}
            <a class="menu-link" href="{{ node.url }}"{% if node.open_in_new_tab %} target="_blank" rel="noopener noreferrer"{% endif %}>
                <span class="analytics-inline-icon" aria-hidden="true">
                    {{ node.icon_svg|safe }}
                </span>
                <div>{{ node.label }}</div>
            </a>
        {% endif %}
    </li>
{% endfor %}
